<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>EarnTon Ranch</title>

<script src="https://telegram.org/js/telegram-web-app.js"></script>

<style>
body{
background:#0f0f0f;
color:white;
text-align:center;
font-family:sans-serif;
}

.card{
background:#1b1b1b;
padding:20px;
border-radius:15px;
margin:15px;
}

button{
padding:15px;
border:none;
border-radius:10px;
font-size:16px;
margin:10px;
background:#28a745;
color:white;
}

.shop{
margin-top:20px;
}
</style>

</head>

<body>

<h1>🚜 EarnTon Ranch</h1>

<div class="card">
<h2 id="coins">Coins: 100</h2>
<h3 id="cows">Cows: 0</h3>
<h3 id="profit">Profit/sec: 0</h3>
</div>

<div class="card">
<button onclick="collect()">💰 Collect Profit</button>
</div>

<div class="card shop">

<h2>🛒 Shop</h2>

<button onclick="buyCow()">🐄 Buy Cow (50)</button>

</div>

<script>

let coins = localStorage.getItem("coins") ? parseInt(localStorage.getItem("coins")) : 100
let cows = localStorage.getItem("cows") ? parseInt(localStorage.getItem("cows")) : 0

function save(){
localStorage.setItem("coins",coins)
localStorage.setItem("cows",cows)
}

function update(){
document.getElementById("coins").innerText = "Coins: " + coins
document.getElementById("cows").innerText = "Cows: " + cows
document.getElementById("profit").innerText = "Profit/sec: " + cows*2
}

function buyCow(){

if(coins >= 50){

coins -= 50
cows += 1

save()
update()

}else{
alert("Not enough coins")
}

}

function collect(){

let profit = cows * 5

coins += profit

save()
update()

}

setInterval(()=>{

coins += cows * 2

save()
update()

},1000)

update()

</script>

</body>
</html>
